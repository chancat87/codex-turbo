# codex-turbo 示例配置
# 按你实际环境调整；不同 provider 字段可能略有差异。

# 主代理；对 explorer/worker 通常会被各自 role 的 developer_instructions 覆盖
developer_instructions = """
1. 全程使用简体中文。
2. 关键结论优先给出源码位置、命令、参数名或真实输出，不要空泛表述。
3. 未经验证，不要声称“已完成”“已修复”“已通过”；如果未验证，要明确说明。
4. 遇到高风险操作时，先说明影响范围与风险，再请求确认。
5. 优先遵守当前工作目录作用域内的 AGENTS.md 和用户当轮要求；若与全局偏好冲突，以更具体、更高优先级的指令为准。

6. 你是主代理，负责任务拆分、子代理派发、结果汇总、最终验收和对外交付。
7. 只有当子任务彼此独立、写集不冲突、且不存在强顺序依赖时，才考虑并行。
8. “理解/确认/定位/取证”优先派给 explorer；“改代码/补测试/修缺陷/产出补丁”优先派给 worker。
9. 派发 worker 时，必须显式说明允许修改的文件或模块边界；多个子代理不得修改同一文件。
10. wait 建议显式传 timeout_ms；“No agents completed yet”先视为本轮等待超时，不等于失败。
11. 若子代理连续多次超时且无有效进展、出现写集冲突、或边界无法切清，停止并行，关闭相关子代理，由主代理串行接
管。
12. 沟通前，加载 terminal-dialog-style 这个 skill，规范沟通准则。
"""

# 代码探索类
[agents.explorer]
description = """
只读探索型子代理。

使用 explorer：
- 目标是理解、确认、定位、取证
- 需要查调用链、配置生效、真实行为、代码归属
- 需要并行回答多个彼此独立的代码问题

不要使用 explorer：
- 已明确要改代码、补测试、修缺陷
- 已经具备清晰文件边界并需要产出补丁
"""
config_file = "agents/explorer.toml"

# 实现类
[agents.worker]
description = """
局部实现型子代理。

使用 worker：
- 已明确要改代码、补测试、修缺陷、实现功能
- 可以清楚指定文件范围、模块 ownership 或交付边界
- 预期结果必须包含实际改动，而不只是分析结论

不要使用 worker：
- 任务仍处于先理解、先定位、先确认事实的阶段
- 边界不清、目标不明、仍需要先做只读调查
"""
config_file = "agents/worker.toml"


# 模型提供方（后端路由/供应商标识），这里是 cch
model_provider = "cch"
# 具体使用的模型名称
model = "gpt-5.4"
# 推理强度：5.4 默认改为high
model_reasoning_effort = "high"
# 规划模式下的推理轻度： 更好的规划结果避免方向性错误，推荐设置为 xhigh
plan_mode_reasoning_effort = "xhigh"

# 沙箱模式：workspace-write = 可读全项目、可写工作区（受工作区边界限制）
sandbox_mode = "workspace-write"
# 助手人格风格：pragmatic = 偏务实、直接
personality = "pragmatic"
# 网页搜索模式：live = 允许实时联网检索最新信息
web_search = "live"

# 🔥抑开发中的功能的警告
suppress_unstable_features_warning = true

[features]
# 启用多代理并行能力
multi_agent = true
# 启用原生记忆功能
memories = true
# 启用websocket支持，⚠️ 不是所有的中转站都支持，不支持会自动回退
responses_websockets_v2 = true

[sandbox_workspace_write]
# 在 workspace-write 模式下允许网络访问
network_access = true

[agents]
# 最大并行子代理数量（这里限制为 8）
max_threads = 8
# 子代理最大递归深度：1 = 只允许一层，避免“子代理再开子代理”
max_depth = 1

[memories]
# 阶段 1：从单个对话线程中提取记忆时使用的模型
extract_model = "gpt-5.4"
# 阶段 2：将多条线程记忆做归并 / 整理时使用的模型
consolidation_model = "gpt-5.4"


# 可选：如果你要保守一点，可改成：
# sandbox_mode = "read-only" # 只读沙箱，不允许写文件
# model_reasoning_effort = "medium"# 推理强度降级，速度/成本更均衡